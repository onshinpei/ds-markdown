name: Deploy Chinese Docs

on:
  push:
    branches:
      - main
    paths:
      - 'nextra-docs-zh/**'
      - '.github/workflows/deploy-docs-zh.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs-zh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nextra-docs-zh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextra-docs-zh/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to gh-pages /zh
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/zh
          publish_branch: gh-pages
          destination_dir: zh
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(zh): deploy ${{ github.sha }}'
